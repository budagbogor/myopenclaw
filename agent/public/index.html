<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MyClaw Agent</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="header">
      <div class="header__title">MyClaw Agent</div>
      <nav class="header__nav">
        <button class="nav__btn" data-view="tasks">Tasks</button>
        <button class="nav__btn" data-view="approvals">Approvals</button>
        <button class="nav__btn" data-view="inbox">Inbox</button>
        <button class="nav__btn" data-view="reminders">Reminders</button>
        <button class="nav__btn" data-view="logs">Logs</button>
        <button class="nav__btn" data-view="tools">Tools</button>
      </nav>
      <div class="header__right">
        <span id="status" class="status">Connecting…</span>
        <button id="refresh" class="btn btn--ghost">Refresh</button>
      </div>
    </header>

    <main class="main">
      <section id="view-tasks" class="view"></section>
      <section id="view-approvals" class="view"></section>
      <section id="view-inbox" class="view"></section>
      <section id="view-reminders" class="view"></section>
      <section id="view-logs" class="view"></section>
      <section id="view-tools" class="view"></section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
